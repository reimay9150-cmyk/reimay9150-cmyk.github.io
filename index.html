<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Homepage</title>

  <style>
    body{
      font-family: sans-serif;
      background:#f5f5f5;
      text-align:center;
      padding:50px;
    }

    .card{
      background:white;
      padding:40px;
      border-radius:20px;
      max-width:600px;
      margin:auto;
      box-shadow:0 0 20px rgba(0,0,0,0.1);
    }

    h1{
      color:#333;
    }

    p{
      color:#666;
      font-size:18px;
    }

    button{
      padding:12px 24px;
      border:none;
      background:#0078ff;
      color:white;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#005fcc;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>こんにちは！</h1>

    <p>
      これは私のホームページです。
    </p>

    <button onclick="alert('ありがとう！')">
      クリック
    </button>
  </div>

</body>
</html>
